<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>愛之語 劇情挑戰模式 (PVE)</title>
    <style>
        :root {
            --primary: #ff85a1;
            --gold: #ffd700;
            --fav-color: #2ed573;
            --pve-blue: #4facfe;
            --pve-dark: #1a1a2e;
            --bg-dark: #0f0c29;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background: #000; font-family: "Microsoft JhengHei", sans-serif;
            color: white; user-select: none; -webkit-user-select: none;
            touch-action: pan-y;
        }

        /* --- 3D 空間背景 --- */
        #room-env {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            perspective: 600px; overflow: hidden; z-index: 0;
            background: linear-gradient(to bottom, #0f0c29, #24243e 60%, #050510);
        }
        .floor {
            position: absolute; width: 3000px; height: 3000px; left: 50%; top: 50%;
            margin-left: -1500px; margin-top: -300px;
            transform: rotateX(85deg) translateZ(-100px);
            background: radial-gradient(circle at center, transparent 10%, #050510 70%), 
                        linear-gradient(rgba(255, 133, 161, 0.2) 2px, transparent 2px), 
                        linear-gradient(90deg, rgba(255, 133, 161, 0.2) 2px, transparent 2px);
            background-size: 100% 100%, 80px 80px, 80px 80px;
        }
        .center-glow {
            position: absolute; width: 400px; height: 400px; left: 50%; top: 50%;
            margin-left: -200px; margin-top: -50px;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.2), transparent 60%);
            transform: rotateX(85deg) translateZ(-98px); border-radius: 50%;
        }

        /* --- UI 疊層與區塊控制 --- */
        .app-container {
            position: absolute; top: 0; left: 0; right: 0; 
            width: 100%; height: 100%; z-index: 10; 
            display: flex; flex-direction: column; align-items: center;
            pointer-events: none; max-width: 1150px; margin: 0 auto;
        }

        .step-section {
            display: none; width: 100%; height: 100%;
            flex-direction: column; align-items: center; justify-content: flex-start;
            padding-top: 50px; box-sizing: border-box;
            animation: fadeIn 0.5s ease-in-out;
            pointer-events: auto !important; 
        }
        .step-section.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h2 { color: var(--gold); text-shadow: 0 0 10px rgba(255,215,0,0.5); margin: 0 0 15px 0; font-size: 2rem; text-align: center; pointer-events: auto; }
        .instruction { background: rgba(0,0,0,0.6); padding: 10px 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px); font-size: 1.1rem; font-weight: bold; margin-bottom: 20px; text-align: center; pointer-events: auto; }

        /* --- 視覺小說：背景與立繪 --- */
        #pve-bg { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background-size: cover; background-position: center; z-index: 1; 
            transition: opacity 0.5s; pointer-events: none;
        }
        #pve-sprite { 
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); 
            max-height: 85vh; z-index: 2; pointer-events: none; transition: opacity 0.5s;
        }

        /* --- 首頁：傾斜角色選擇卡牌 --- */
        .char-container {
            display: flex; gap: 25px; justify-content: center; z-index: 3;
            height: 60vh; min-height: 400px; width: 90%; max-width: 900px; margin-top: 10px;
        }
        .char-card {
            flex: 1; position: relative; overflow: hidden; cursor: pointer;
            transform: skewX(-8deg); border: 3px solid #444; background: #111; border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            pointer-events: auto;
        }
        .char-bg {
            position: absolute; top: -10%; left: -20%; width: 140%; height: 120%;
            background-size: cover; background-position: top center; background-repeat: no-repeat;
            transform: skewX(8deg); transition: all 0.4s; opacity: 0.5; filter: grayscale(60%) brightness(0.7);
        }
        .char-info {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 40px 30px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 60%, transparent 100%);
            transform: skewX(8deg); color: white; transition: all 0.4s; text-align: center;
        }
        .char-name { font-size: 2.2rem; font-weight: bold; color: #fff; text-shadow: 0 0 10px rgba(0,0,0,0.8); margin-bottom: 10px; transition: 0.3s;}
        .char-desc { font-size: 1rem; line-height: 1.5; color: #ddd; text-shadow: 0 0 5px #000; opacity: 0; transform: translateY(20px); transition: all 0.3s; font-style: italic; }

        .char-card:hover { flex: 1.3; border-color: var(--pve-blue); box-shadow: 0 0 40px rgba(79, 172, 254, 0.5), inset 0 0 20px rgba(79, 172, 254, 0.3); z-index: 10; }
        .char-card:hover .char-bg { opacity: 1; filter: grayscale(0%) brightness(1.1); transform: skewX(8deg) scale(1.05); }
        .char-card:hover .char-info { padding-bottom: 30px; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(79,172,254,0.4) 100%); }
        .char-card:hover .char-name { color: var(--gold); text-shadow: 0 0 15px var(--gold); }
        .char-card:hover .char-desc { opacity: 1; transform: translateY(0); }

        /* --- PVE 小說式劇本對話框 --- */
        #step-story { 
            justify-content: flex-end; padding-bottom: 5vh; cursor: pointer; z-index: 5;
        }
        .story-dialog-box {
            background: rgba(12, 12, 28, 0.95); border: 2px solid var(--pve-blue); border-radius: 20px;
            padding: 30px; width: 90%; max-width: 850px; text-align: left; pointer-events: auto;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9), inset 0 0 20px rgba(79, 172, 254, 0.1); 
            backdrop-filter: blur(15px); position: relative; margin-bottom: 0; z-index: 10;
        }
        .story-speaker { font-size: 1.4rem; font-weight: bold; color: var(--gold); margin-bottom: 15px; border-bottom: 2px solid rgba(79, 172, 254, 0.3); padding-bottom: 8px; letter-spacing: 1px; }
        .story-text { font-size: 1.2rem; line-height: 1.8; color: #fff; min-height: 90px; letter-spacing: 0.5px; white-space: pre-wrap; }
        .story-options { display: none; flex-direction: column; gap: 12px; width: 100%; margin-top: 25px; pointer-events: auto; }
        
        .story-opt-btn { 
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.25); color: white; 
            padding: 15px; border-radius: 12px; font-size: 1.1rem; cursor: pointer; text-align: left; 
            transition: 0.2s; font-weight: bold; -webkit-appearance: none; appearance: none; 
        }
        .story-opt-btn:hover { background: linear-gradient(90deg, rgba(79,172,254,0.25), transparent); border-color: var(--pve-blue); box-shadow: 0 0 15px rgba(79,172,254,0.4); transform: translateX(5px); }
        .story-opt-btn.completed { background: rgba(46, 213, 115, 0.1); border-color: rgba(46, 213, 115, 0.5); color: #ccc; }

        .click-indicator { position: absolute; bottom: 15px; right: 20px; font-size: 1rem; color: var(--gold); animation: bounce 1s infinite; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        /* --- 手機對話介面 (結局專用) --- */
        #step-chat-screen { z-index: 5; }
        .chat-container { 
            background: #141423; border: 2px solid #333; border-radius: 20px; width: 90%; max-width: 450px; 
            height: 55vh; min-height: 350px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; 
            gap: 15px; pointer-events: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.6); margin-bottom: 20px;
        }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        .chat-bubble { max-width: 75%; padding: 12px 16px; border-radius: 16px; font-size: 1.05rem; line-height: 1.5; font-weight: bold; word-break: break-word; box-shadow: 0 3px 10px rgba(0,0,0,0.3); animation: fadeIn 0.4s ease; }
        .chat-bubble.left { background: #262642; color: white; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #3d3d66; }
        .chat-bubble.right { background: var(--pve-blue); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }

        /* --- 實體卡牌基礎樣式 --- */
        #step-cards { z-index: 5; }
        .cards-stage { position: relative; width: 100%; flex: 1; perspective: 1000px; transform-style: preserve-3d; display: flex; justify-content: center; align-items: center; margin-top: -30px; }
        .card {
            position: absolute; width: 180px; height: 350px; cursor: pointer; transform-style: preserve-3d;
            transform: translateX(100vw) translateZ(-800px) rotateY(-45deg); opacity: 0; pointer-events: none; z-index: 1; 
            touch-action: pan-x pan-y; -webkit-tap-highlight-color: transparent; outline: none; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .card-visual { position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: 2px solid var(--gold); border-radius: 12px; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2), inset 0 0 15px rgba(0,0,0,0.8); background-color: #111; overflow: hidden; transition: all 0.3s; }
        .card.dealing { transition: none !important; animation: dealAnim 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        .card.dealt { transform: translateX(var(--tx)) rotateY(var(--ry)) translateZ(var(--tz)); opacity: 1; pointer-events: auto; }
        
        .card-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.7; z-index: 1; transition: opacity 0.3s; }
        .card-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.6) 100%); z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .card-label { color: var(--gold); font-weight: bold; font-size: 1.3rem; text-shadow: 0 0 10px #000, 0 0 5px var(--gold); text-align: center; padding: 10px; }
        .zoom-btn { position: absolute; top: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.6); border: 1px solid var(--gold); color: white; border-radius: 50%; width: 35px; height: 35px; display: flex; justify-content: center; align-items: center; font-size: 1.1rem; transition: 0.2s; pointer-events: auto; }
        
        .card.selected-fav { transform: translateX(var(--tx)) rotateY(var(--ry)) translateZ(calc(var(--tz) + 20px)) translateY(-20px) scale(1.05) !important; z-index: 5 !important; }
        .card.selected-fav .card-visual { border-color: var(--fav-color); box-shadow: 0 0 30px rgba(46, 213, 115, 0.6), inset 0 0 15px rgba(46, 213, 115, 0.3); }
        .card.dimmed .card-visual { opacity: 0.5 !important; filter: grayscale(80%); border-color: #555; }
        
        @keyframes dealAnim { 0% { transform: translateX(100vw) translateZ(-800px) rotateY(-45deg); opacity: 0; } 100% { transform: translateX(var(--tx)) rotateY(var(--ry)) translateZ(var(--tz)); opacity: 1; } }

        @media (hover: hover) {
            .card-visual:hover { border-color: #fff; box-shadow: 0 0 30px rgba(255,255,255,0.4); }
            .card:hover { z-index: 10; }
            .zoom-btn:hover { background: var(--gold); color: black; transform: scale(1.1); }
            .btn-main:hover:not(:disabled) { background: var(--primary); color: #000; text-shadow: none; box-shadow: 0 0 25px var(--primary); }
            .top-btn:hover { transform: scale(1.05); }
        }

        /* 頂端控制按鈕群樣式 */
        .btn-main { 
            background: rgba(15, 15, 25, 0.85); border: 2px solid var(--pve-blue); color: white; 
            padding: 14px 45px; font-size: 1.2rem; font-weight: bold; border-radius: 30px; 
            cursor: pointer; transition: all 0.3s; pointer-events: auto; backdrop-filter: blur(5px); 
            text-shadow: 0 0 5px #000; box-shadow: 0 0 15px rgba(79, 172, 254, 0.3); margin-bottom: 25px;
            -webkit-appearance: none; appearance: none;
        }
        .btn-main:disabled { border-color: #555 !important; color: #777 !important; box-shadow: none !important; cursor: not-allowed !important; background: rgba(30,30,30,0.5) !important; }

        /* 放大圖片遮罩 */
        .image-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0, 0, 0, 0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; animation: fadeIn 0.3s ease; backdrop-filter: blur(5px); pointer-events: auto; }
        .image-modal img { max-width: 90%; max-height: 80vh; border-radius: 12px; box-shadow: 0 0 30px rgba(255,255,255,0.2); }
        .close-text { color: white; margin-top: 20px; font-size: 1.2em; cursor: pointer; letter-spacing: 2px; }

        /* 👼 天使卡階段精靈提示 (縮小化不擋版面) */
        #mascot-ui {
            position: absolute; bottom: 20px; right: 20px; display: none; align-items: flex-end; gap: 10px; z-index: 200; 
            animation: fadeIn 0.5s ease; pointer-events: none;
        }
        .mascot-img { width: 90px; height: auto; filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.3)); animation: floatMascot 3s ease-in-out infinite; }
        .speech-bubble { 
            background: rgba(255,255,255,0.95); color: #2f3542; padding: 12px 18px; border-radius: 15px 15px 0 15px; 
            border: 2px solid var(--gold); box-shadow: 0 5px 15px rgba(0,0,0,0.4); font-weight: bold; font-size: 0.95rem; 
            line-height: 1.5; max-width: 200px; margin-bottom: 25px; text-align: left;
        }
        .speech-bubble::after { content: ''; position: absolute; bottom: -2px; right: -12px; border-width: 12px 0 0 12px; border-style: solid; border-color: transparent transparent transparent rgba(255,255,255,0.95); display: block; width: 0; filter: drop-shadow(2px 0px 0px var(--gold)); }
        @keyframes floatMascot { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        /* --- 手機版 RWD 適配 --- */
        @media (max-width: 768px) {
            h2 { font-size: 1.6rem !important; margin-bottom: 10px !important; }
            .instruction { font-size: 0.95rem; padding: 10px 20px; width: 85%; margin-bottom: 10px; }
            
            .char-container { flex-direction: column; height: auto; transform: none; width: 95%; margin-top: 0; }
            .char-card { transform: skewX(0deg); height: 200px; border-radius: 16px; margin-bottom: 15px; }
            .char-bg { transform: skewX(0deg); top: 0; left: 0; width: 100%; height: 100%; }
            .char-info { transform: skewX(0deg); padding: 15px; }
            
            .story-dialog-box { padding: 20px 15px; width: 95%; margin-bottom: 10px; }
            .story-speaker { font-size: 1.2rem; margin-bottom: 10px; padding-bottom: 5px; }
            .story-text { font-size: 1.05rem; min-height: 110px; }
            .story-opt-btn { font-size: 1rem; padding: 12px; }
            
            #top-right-btns { gap: 5px !important; top: 10px !important; right: 10px !important; justify-content: flex-start !important; max-width: 100% !important; left: 10px; }
            .top-btn { font-size: 0.8rem !important; padding: 6px 10px !important; }

            .cards-stage {
                justify-content: flex-start; overflow-x: auto; scroll-snap-type: x mandatory;
                padding: 0 calc(50vw - 90px); -webkit-overflow-scrolling: touch; scrollbar-width: none; 
                gap: 15px; perspective: none; transform-style: flat; margin-top: 10px;
                align-items: flex-end; padding-bottom: 30px;
            }
            .cards-stage::-webkit-scrollbar { display: none; }
            .card { position: relative; flex: 0 0 180px; scroll-snap-align: center; transform: translateY(100vh); }
            @keyframes dealAnim { 0% { transform: translateY(50vh); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
            .card.dealt { transform: translateY(0); }
            .card.selected-fav { transform: translateY(-15px) scale(1.05) !important; }
            
            #mascot-ui { bottom: 10px; right: 10px; }
            .mascot-img { width: 70px; }
            .speech-bubble { font-size: 0.85rem; max-width: 160px; padding: 10px 14px; margin-bottom: 15px;}
        }
    </style>
</head>
<body>

<div id="pve-bg" style="display:none; opacity:0;"></div>
<img id="pve-sprite" src="" style="display:none; opacity:0;" alt="角色立繪">

<div id="top-right-btns" style="position: fixed; top: 15px; right: 20px; z-index: 9999; display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; max-width: 70%; pointer-events: none;">
    <button id="btn-sfx" class="btn-main top-btn" style="padding: 10px 15px; margin: 0; font-size: 1rem; width: auto;" onclick="toggleSFX(event)">🔊 音效: 開</button>
    <button id="btn-bgm" class="btn-main top-btn" style="padding: 10px 15px; margin: 0; font-size: 1rem; width: auto;" onclick="toggleBGM(event)">🎵 BGM: 關</button>
    <button id="btn-pve-back" class="btn-main top-btn" style="display: none; padding: 10px 15px; margin: 0; font-size: 1rem; width: auto;" onclick="backToAngelCards(event)">&lt; 返回提問</button>
    <button id="btn-pve-skip" class="btn-main top-btn" style="display: none; padding: 10px 15px; margin: 0; font-size: 1rem; width: auto;" onclick="skipPveIntro(event)">&gt;&gt;</button>
    <button id="btn-pve-reselect" class="btn-main top-btn" style="display: none; padding: 10px 20px; margin: 0; font-size: 1rem; width: auto;" onclick="showNPCMenu(event)">重新選擇挑戰路線</button>
    <button id="top-home-btn" class="btn-main top-btn" style="display: none; padding: 10px 20px; margin: 0; font-size: 1rem; width: auto;" onclick="returnToModeSelect(event)">🔙 返回模式選擇</button>
</div>

<div id="room-env"><div class="floor"></div><div class="center-glow"></div></div>

<div class="app-container">
    
    <div id="step-char-select" class="step-section active" style="justify-content: center;">
        <h2 style="font-size: 2.5rem; margin-bottom: 20px; text-shadow: 0 0 15px var(--pve-blue); color: #fff;">選擇挑戰對象</h2>
        <div class="char-container">
            <div class="char-card" onclick="playSFX(); selectNPC('xuchen')">
                <div class="char-bg" style="background-image: url('pveboy.png');"></div>
                <div class="char-info">
                    <div class="char-name">黃旭辰</div>
                    <div class="char-desc">「我愛詩紜，不管多苦我都會撐過去的。」</div>
                </div>
            </div>
            <div class="char-card" onclick="playSFX(); selectNPC('shiyun')">
                <div class="char-bg" style="background-image: url('pvegirl.png');"></div>
                <div class="char-info">
                    <div class="char-name">賴詩耘</div>
                    <div class="char-desc">「他應該要體諒我的困擾，而不是整天只想著玩。」</div>
                </div>
            </div>
        </div>
    </div>

    <div id="step-story" class="step-section" onclick="handlePveDialogClick()">
        <div class="story-dialog-box" onclick="event.stopPropagation(); handlePveDialogClick();">
            <div class="story-speaker" id="story-speaker-name">角色名字</div>
            <div class="story-text" id="story-display-text"></div>
            <div class="click-indicator" id="story-click-indicator">▼ Click</div>
            <div class="story-options" id="story-options-container"></div>
        </div>
    </div>

    <div id="step-cards" class="step-section">
        <h2 id="cards-title">天使卡提示</h2>
        <div class="instruction" id="cards-inst">請點擊卡片獲取線索</div>
        <div class="cards-stage" id="stage-main"></div>
        <button id="btn-cards-next" class="btn-main" disabled onclick="handleCardStageNext()">確定選擇</button>
        
        <div id="mascot-ui">
            <div class="speech-bubble" id="mascot-text"></div>
            <img src="spirit.png" class="mascot-img" alt="日記精靈">
        </div>
    </div>

    <div id="step-chat-screen" class="step-section" style="justify-content: center;">
        <h2 style="color:var(--pve-blue); margin-bottom:15px; text-shadow:0 0 10px var(--pve-blue);">幾天之後...</h2>
        <div class="chat-container" id="chat-bubble-box"></div>
        <div class="story-options" id="pve-chat-navi" style="max-width:450px; margin-top:10px; pointer-events:auto; display:flex;"></div>
    </div>

</div>

<div id="image-modal" class="image-modal" onclick="closeModal()">
    <img id="modal-image" src="" alt="圖片">
    <div class="close-text">點擊任意處關閉 ✖</div>
</div>

<script>
    // =========================================================
    // 🎵 音效與音樂系統
    // =========================================================
    let bgmEnabled = false;
    let sfxEnabled = true;
    let currentBgm = null;

    function playSFX() {
        if (sfxEnabled) {
            let sfx = new Audio('se_click.wav');
            sfx.play().catch(e => console.log("SFX Error:", e));
        }
    }

    function toggleBGM(e) {
        if(e) e.stopPropagation();
        bgmEnabled = !bgmEnabled;
        let btn = document.getElementById('btn-bgm');
        if (bgmEnabled) {
            btn.innerHTML = "🎵 BGM: 開";
            if (!currentBgm) {
                currentBgm = new Audio('bgm_hub.mp3');
                currentBgm.loop = true;
            }
            currentBgm.play().catch(err => console.log("BGM Error:", err));
        } else {
            btn.innerHTML = "🎵 BGM: 關";
            if (currentBgm) currentBgm.pause();
        }
        playSFX();
    }

    function toggleSFX(e) {
        if(e) e.stopPropagation();
        sfxEnabled = !sfxEnabled;
        let btn = document.getElementById('btn-sfx');
        btn.innerHTML = sfxEnabled ? "🔊 音效: 開" : "🔊 音效: 關";
        playSFX();
    }

    // =========================================================
    // 📖 PVE 劇情探索核心資料庫 
    // =========================================================
    const pveData = {
        xuchen: {
            name: "黃旭辰", 
            partner: "賴詩耘",

    // 播放單句打字效果 (💡 完美支援 HTML 標籤瞬間讀取)
    function playPveDialogLine() {
        const line = currentPveSequence[pveSeqIndex];
        const textEl = document.getElementById('story-display-text');
        const speakerEl = document.getElementById('story-speaker-name');
        const indicator = document.getElementById('story-click-indicator');

        indicator.style.opacity = '0';
        document.getElementById('story-options-container').style.display = 'none';
        updateTopButtons('step-story'); 

        speakerEl.innerHTML = line.speaker;
        textEl.innerHTML = ""; 
        
        isPveTyping = true; 
        let charIndex = 0; 
        let displayedText = "";
        clearInterval(pveTypingTimer);
        
        pveTypingTimer = setInterval(() => {
            if (charIndex >= line.text.length) { 
                clearInterval(pveTypingTimer); 
                isPveTyping = false; 
                checkPveOptionsOrIndicator();
                return;
            }
            
            let char = line.text.charAt(charIndex);
            
            // 💡 遇到標籤一次性讀取完畢並套用，不會拆字
            if (char === '<') {
                let tag = "";
                while(charIndex < line.text.length && line.text.charAt(charIndex) !== '>') {
                    tag += line.text.charAt(charIndex);
                    charIndex++;
                }
                tag += '>';
                displayedText += tag;
                charIndex++;
            } else {
                displayedText += char;
                charIndex++;
            }
            textEl.innerHTML = displayedText;
        }, 35); 
    }

    function checkPveOptionsOrIndicator() {
        const currentLine = currentPveSequence[pveSeqIndex];
        const indicator = document.getElementById('story-click-indicator');
        
        if (currentLine.options && currentLine.options.length > 0) {
            const container = document.getElementById('story-options-container');
            container.innerHTML = '';
            currentLine.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'story-opt-btn ' + (opt.className || '');
                btn.innerHTML = opt.label;
                if(opt.style) btn.style = opt.style;
                btn.onclick = (e) => {
                    e.stopPropagation(); playSFX();
                    opt.onClick();
                };
                container.appendChild(btn);
            });
            container.style.display = 'flex';
            document.getElementById('btn-pve-skip').style.display = 'none';
        } else {
            indicator.style.opacity = '1';
        }
    }

    function handlePveDialogClick() {
        playSFX();
        if (isPveTyping) {
            clearInterval(pveTypingTimer);
            isPveTyping = false;
            document.getElementById('story-display-text').innerHTML = currentPveSequence[pveSeqIndex].text;
            checkPveOptionsOrIndicator();
        } else {
            if (currentPveSequence[pveSeqIndex].onEnd) {
                currentPveSequence[pveSeqIndex].onEnd();
                return;
            }
            if (pveSeqIndex < currentPveSequence.length - 1) {
                pveSeqIndex++;
                playPveDialogLine();
            }
        }
    }

    function skipPveIntro(e) {

        if (currentPveSequence.length > 0) {

            clearInterval(pveTypingTimer);
            isPveTyping = false;
            document.getElementById('story-speaker-name').innerHTML = currentPveSequence[pveSeqIndex].speaker;
            document.getElementById('story-display-text').innerHTML = currentPveSequence[pveSeqIndex].text;
            checkPveOptionsOrIndicator();
        }
    }

        const box = document.getElementById('chat-bubble-box'); box.innerHTML = '';
        let sA = pveSuggestions[selectedLoveLangs[0]]; let sB = pveSuggestions[selectedLoveLangs[1]];

        box.insertAdjacentHTML('beforeend', `<div class="chat-bubble right">我推薦你試試看「${sA.title}」和「${sB.title}」喔！</div>`);

        setTimeout(() => {
            playSFX();
            let replyText = '';
            if (matchCount === 2) {
                replyText = `大成功！！！🎉 真的太謝謝你了！我照你說的去做，${npc.name} 超級感動，說我是全世界最懂他的人！能有你這個朋友幫忙分析真的太神了，下次請你吃大餐！😆`;
                if(!pveHistory[currentNpcId].includes(currentScenarioKey)) pveHistory[currentNpcId].push(currentScenarioKey);
            } else if (matchCount === 1) {
                let rightTitle = pveSuggestions[correctIds[0]].title;
                let wrongId = selectedLoveLangs.find(id => !correctAns.includes(id));
                let wrongTitle = pveSuggestions[wrongId].title;
                replyText = `嗨嗨！我試了你的建議。${npc.name} 對於『${rightTitle}』超級開心！不過另一個『${wrongTitle}』好像覺得還好😅。但整體來說危機解除了，謝啦！✨`;
            } else {
                replyText = `呃...我試了你的方法，但 ${npc.name} 好像反應平平😅。看來我真是個木頭，沒抓到他在意的點...我再花點時間觀察看看，還是謝謝你聽我訴苦！💪`;
            }
            
            box.insertAdjacentHTML('beforeend', `<div class="chat-bubble left">${replyText}</div>`);
            box.scrollTop = box.scrollHeight; 
            
            const navi = document.getElementById('pve-chat-navi');
            navi.innerHTML = `
                <button class="story-opt-btn" style="width:100%; text-align:center;" onclick="showNPCMenu(event)">回 ${npc.partner} 的煩惱清單</button>
            `;
        }, 1000);
    }

    // --- 實體卡牌核心邏輯 (支援 3D 扇形與手機 RWD 滑動) ---
    const flat2 = [ {tx: -120, ry: 0, tz: 0}, {tx: 120, ry: 0, tz: 0} ]; 
    const flat5 = [ {tx: -420, ry: 0, tz: 0}, {tx: -210, ry: 0, tz: 0}, {tx: 0, ry: 0, tz: 0}, {tx: 210, ry: 0, tz: 0}, {tx: 420, ry: 0, tz: 0} ];

    function dealCards(stageId, items, isLoveLang) {
        const stage = document.getElementById(stageId);
        stage.innerHTML = ''; 
        const layout = items.length === 2 ? flat2 : flat5;

        items.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = `card`;
            card.style.setProperty('--tx', `${layout[index]?.tx || 0}px`);
            card.style.setProperty('--ry', `${layout[index]?.ry || 0}deg`);
            card.style.setProperty('--tz', `${layout[index]?.tz || 0}px`);
            
            card.style.touchAction = "pan-x pan-y"; card.style.webkitTapHighlightColor = "transparent";

            const delayMs = index * 150; card.style.animationDelay = `${delayMs}ms`; 

            let innerHTML = '';
            
            // 💡 提問文字拉至最外層上方，保證不遮住卡片本體
            if (!isLoveLang) {
                innerHTML += `<div style="position:absolute; top:-35px; width:100%; text-align:center; color:var(--gold); font-weight:bold; font-size:1.3rem; text-shadow: 0 0 8px rgba(0,0,0,0.8); z-index: 10;">${item.label || ''}</div>`;
            }

            innerHTML += `<div class="card-visual"><img src="${item.image || item}" class="card-bg">`;
            
            if (isLoveLang) {
                innerHTML += `<div class="card-overlay"><div class="card-label">${item.label}</div></div>`;
                innerHTML += `<div class="zoom-btn" onclick="event.stopPropagation(); playSFX(); openModal('${item.image}')">🔍</div>`;
                card.onclick = () => { playSFX(); handleLoveLangClick(card, item.id); };
            } else {
                innerHTML += `<div class="card-overlay" style="background: rgba(0,0,0,0.3);"></div>`; // 移除內部文字
                card.onclick = () => { playSFX(); handlePveAngelClick(item); };
            }
            innerHTML += `</div>`; 
            
            card.innerHTML = innerHTML; stage.appendChild(card);
            setTimeout(() => { card.classList.add('dealing'); setTimeout(() => { card.classList.remove('dealing'); card.classList.add('dealt'); }, delayMs + 850); }, 50);
        });
    }

    function handleLoveLangClick(cardEl, langId) {
        const isSelected = selectedLoveLangs.includes(langId);
        const maxCount = 2;
        const btn = document.getElementById('btn-cards-next');
        const npcName = pveData[currentNpcId].name;

        if (isSelected) {
            selectedLoveLangs = selectedLoveLangs.filter(id => id !== langId); cardEl.classList.remove('selected-fav');
        } else {
            if (selectedLoveLangs.length < maxCount) { selectedLoveLangs.push(langId); cardEl.classList.add('selected-fav'); }
        }
        
        document.getElementById('cards-inst').innerHTML = `請根據線索，選出 <span style="color:var(--fav-color);">${maxCount} 張</span> ${npcName} 渴望的愛之語 (${selectedLoveLangs.length}/${maxCount})`;
        btn.disabled = (selectedLoveLangs.length !== maxCount);
    }

    function openModal(imgSrc) { document.getElementById('modal-image').src = imgSrc; document.getElementById('image-modal').style.display = 'flex'; }
    function closeModal() { playSFX(); document.getElementById('image-modal').style.display = 'none'; }
</script>
